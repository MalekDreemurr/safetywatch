<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafteyWatch – Attendance Logs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
 <link rel="stylesheet" href="../css/style-dark.css">
 <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
 <script>
   (function() {
     var t = localStorage.getItem('theme') || 'dark';
     document.documentElement.setAttribute('data-theme', t);
   })();
 </script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="../safetywatch.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      SafteyWatch
    </a>
    <ul class="nav-links">
      <li><a href="safetywatch-my-dashboard.html">Dashboard</a></li>
      <li><a href="#" class="active">Attendance Logs</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <span class="nav-welcome">Welcome, <strong>Mohamed Ali</strong></span>
      <button class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="page-header">
      <div class="page-title">
        <h1>My Attendance Logs</h1>
        <p>View your complete attendance history</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline" id="selectMonthBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span id="monthBtnText">Select Month</span>
        </button>
        <button class="btn btn-primary" id="exportBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
      </div>
    </div>

    <!-- MONTH PICKER MODAL -->
    <div class="modal-overlay" id="monthPickerOverlay">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Select Month</h3>
          <button class="modal-close" id="closeMonthPicker">&times;</button>
        </div>
        <div class="modal-body">
          <input type="month" id="monthInput" class="month-input">
          <div class="modal-actions">
            <button class="btn btn-outline" id="clearMonthBtn">Clear Filter</button>
            <button class="btn btn-primary" id="applyMonthBtn">Apply</button>
          </div>
        </div>
      </div>
    </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value blue">22</div>
        <div class="stat-label">Days Present</div>
      </div>
      <div class="stat-card">
        <div class="stat-value orange">2</div>
        <div class="stat-label">Days Late</div>
      </div>
      <div class="stat-card">
        <div class="stat-value red">1</div>
        <div class="stat-label">Days Absent</div>
      </div>
      <div class="stat-card">
        <div class="stat-value green">186.5h</div>
        <div class="stat-label">Total Hours</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Check In</th>
            <th>Check Out</th>
            <th>Total Hours</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script>
    const rows = [
      { date: "2026-02-01", in: "08:45 AM", out: "05:30 PM", hours: "8.75h", status: "Present" },
      { date: "2026-01-31", in: "08:50 AM", out: "05:25 PM", hours: "8.58h", status: "Present" },
      { date: "2026-01-30", in: "08:35 AM", out: "05:40 PM", hours: "9.08h", status: "Present" },
      { date: "2026-01-29", in: "08:55 AM", out: "05:35 PM", hours: "8.67h", status: "Present" },
      { date: "2026-01-28", in: "09:10 AM", out: "05:45 PM", hours: "8.58h", status: "Late"    },
      { date: "2026-01-27", in: "08:40 AM", out: "05:20 PM", hours: "8.67h", status: "Present" },
      { date: "2026-01-26", in: "08:30 AM", out: "05:15 PM", hours: "8.75h", status: "Present" },
      { date: "2026-01-25", in: "-",        out: "-",        hours: "0h",    status: "Absent"  },
      { date: "2026-01-24", in: "08:45 AM", out: "05:30 PM", hours: "8.75h", status: "Present" },
      { date: "2026-01-23", in: "08:55 AM", out: "05:40 PM", hours: "8.75h", status: "Present" },
      { date: "2026-01-22", in: "08:25 AM", out: "05:10 PM", hours: "8.75h", status: "Present" },
      { date: "2026-01-21", in: "09:05 AM", out: "05:50 PM", hours: "8.75h", status: "Late"    },
    ];

    const badgeClass = { Present: "badge-present", Late: "badge-late", Absent: "badge-absent" };
    let selectedMonth = null;

    function renderTable(filteredRows) {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      filteredRows.forEach(r => {
        const isDash = r.in === "-";
        tbody.innerHTML += `
        <tr>
          <td class="date-cell">${r.date}</td>
          <td class="${isDash ? 'dash-cell' : ''}">${r.in}</td>
          <td class="${isDash ? 'dash-cell' : ''}">${r.out}</td>
          <td>${r.hours}</td>
          <td><span class="badge ${badgeClass[r.status]}">${r.status}</span></td>
        </tr>`;
      });
    }

    function filterByMonth(month) {
      if (!month) return rows;
      return rows.filter(r => r.date.startsWith(month));
    }

    renderTable(rows);

    // Month picker modal
    const overlay = document.getElementById("monthPickerOverlay");
    const monthInput = document.getElementById("monthInput");
    const monthBtnText = document.getElementById("monthBtnText");

    document.getElementById("selectMonthBtn").addEventListener("click", () => {
      overlay.style.display = "flex";
      if (selectedMonth) monthInput.value = selectedMonth;
    });

    document.getElementById("closeMonthPicker").addEventListener("click", () => {
      overlay.style.display = "none";
    });

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) overlay.style.display = "none";
    });

    document.getElementById("clearMonthBtn").addEventListener("click", () => {
      selectedMonth = null;
      monthBtnText.textContent = "Select Month";
      monthInput.value = "";
      renderTable(rows);
      overlay.style.display = "none";
    });

    document.getElementById("applyMonthBtn").addEventListener("click", () => {
      selectedMonth = monthInput.value;
      if (selectedMonth) {
        const [year, month] = selectedMonth.split("-");
        const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        monthBtnText.textContent = `${monthNames[parseInt(month)-1]} ${year}`;
        renderTable(filterByMonth(selectedMonth));
      }
      overlay.style.display = "none";
    });

    // Export to Excel
    document.getElementById("exportBtn").addEventListener("click", () => {
      const dataToExport = selectedMonth ? filterByMonth(selectedMonth) : rows;
      const exportData = dataToExport.map(r => ({
        "Date": r.date,
        "Check In": r.in,
        "Check Out": r.out,
        "Total Hours": r.hours,
        "Status": r.status
      }));
      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Attendance");
      XLSX.writeFile(wb, "attendance-logs.xlsx");
    });
  </script>

  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      min-width: 320px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { margin: 0; font-size: 18px; color: #e2e8f0; }
    .modal-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: #e2e8f0; }
    .month-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 16px;
      box-sizing: border-box;
    }
    .month-input:focus { outline: none; border-color: #3b82f6; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }
  </style>
  <script>
  function toggleTheme() {
    var html = document.documentElement;
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }
  </script>
</body>
</html>
