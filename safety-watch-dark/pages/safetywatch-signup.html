<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafteyWatch – Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
 <link rel="stylesheet" href="../css/style-dark.css">
 <script>
   (function() {
     var t = localStorage.getItem('theme') || 'dark';
     document.documentElement.setAttribute('data-theme', t);
   })();
 </script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="../safetywatch.html" class="logo">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
      </svg>
       SafteyWatch
    </a>

    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a href="safetywatch-login.html" class="btn-nav btn-outline">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
        </svg>
        Login
      </a>
      <a href="#" class="btn-nav btn-filled">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Sign Up
      </a>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page-center">

    <div class="page-heading">
      <h1>Create Account</h1>
       <p>Join SafteyWatch</p>
    </div>

    <div class="form-card">

      <!-- Role Toggle -->
      <div class="role-toggle">
        <button class="role-btn active" id="role-employee" onclick="setRole('employee')">
          <svg fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Sign up as Employee</span>
        </button>
        <button class="role-btn" id="role-admin" onclick="setRole('admin')">
          <svg fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Sign up as Admin</span>
        </button>
      </div>

      <!-- Fields -->
      <div class="field">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" />
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Create a password" />
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm your password" />
      </div>

      <button class="btn-submit">Create Account</button>

      <div class="signin-row">
        Already have an account? <a href="safetywatch-login.html">Sign In</a>
      </div>

    </div>
  </div>

  <script>
    function setRole(role) {
      document.getElementById('role-employee').classList.toggle('active', role === 'employee');
      document.getElementById('role-admin').classList.toggle('active', role === 'admin');
    }
  </script>
  <script>
  function toggleTheme() {
    var html = document.documentElement;
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }
  </script>

</body>
</html>
