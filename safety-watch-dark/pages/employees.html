<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafteyWatch – Employees</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style-dark.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="../safetywatch.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      SafteyWatch
    </a>
    <ul class="nav-links">
      <li><a href="safetywatch-dashboard.html">Dashboard</a></li>
      <li><a href="#" class="active">Employees</a></li>
      <li><a href="attendance-logs-admin.html">Attendance</a></li>
      <li><a href="violation-logs.html">Violations</a></li>
      <li><a href="security-alerts.html">Alerts</a></li>
      <li><a href="camera-management.html">Cameras</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <span class="nav-welcome">Welcome, <strong>Ahmed Hassan</strong></span>
      <button class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="page-header">
      <div class="page-title">
        <h1>Employees</h1>
        <p>Manage all employees in the system</p>
      </div>
      <button class="btn-add" onclick="document.getElementById('modal').classList.add('open')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Employee
      </button>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-input">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search employees..." oninput="filterTable()"/>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Position</th>
            <th>Status</th>
            <th>Join Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- ADD EMPLOYEE MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Add New Employee</h2>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="newName" placeholder="e.g. Ahmed Hassan"/>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" id="newDept" placeholder="e.g. Backend Development"/>
      </div>
      <div class="form-group">
        <label>Position</label>
        <input type="text" id="newPos" placeholder="e.g. Backend Developer"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="newStatus">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
          <option value="On Leave">On Leave</option>
        </select>
      </div>
      <div class="form-group">
        <label>Join Date</label>
        <input type="date" id="newDate"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal').classList.remove('open'); resetModal()">Cancel</button>
        <button class="btn-save" onclick="addEmployee()">Add Employee</button>
      </div>
    </div>
  </div>

  <script>
    let employees = [
      { name: "Ahmed Hassan",   dept: "AI & Deep Learning",    pos: "AI Engineer",         status: "Active",   date: "2024-01-15" },
      { name: "Sara Mohamed",   dept: "Backend Development",   pos: "Backend Developer",   status: "Active",   date: "2024-02-01" },
      { name: "Omar Ali",       dept: "Mobile Development",    pos: "Flutter Developer",   status: "Active",   date: "2024-01-20" },
      { name: "Fatima Ibrahim", dept: "UI/UX & Frontend",      pos: "Frontend Developer",  status: "On Leave", date: "2024-02-10" },
      { name: "Mohamed Khaled", dept: "Operations",            pos: "Operations Manager",  status: "Active",   date: "2023-12-01" },
      { name: "Nour Ahmed",     dept: "Quality Assurance",     pos: "QA Engineer",         status: "Inactive", date: "2024-01-25" },
    ];

    function badgeClass(status) {
      if (status === "Inactive") return "badge-inactive";
      if (status === "On Leave") return "badge-onleave";
      return "badge-active";
    }

    function renderTable(data) {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = data.map((e, i) => `
        <tr>
          <td class="name-cell">${e.name}</td>
          <td class="dept-cell">${e.dept}</td>
          <td class="pos-cell">${e.pos}</td>
          <td><span class="${badgeClass(e.status)}">${e.status}</span></td>
          <td class="date-cell">${e.date}</td>
          <td>
            <div class="actions-cell">
              <button class="btn-edit" onclick="editEmployee(${i})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit
              </button>
              <button class="btn-delete" onclick="deleteEmployee(${i})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                Delete
              </button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function deleteEmployee(index) {
      employees.splice(index, 1);
      renderTable(employees);
    }

    function editEmployee(index) {
      const e = employees[index];
      document.getElementById("newName").value   = e.name;
      document.getElementById("newDept").value   = e.dept;
      document.getElementById("newPos").value    = e.pos;
      document.getElementById("newStatus").value = e.status;
      document.getElementById("newDate").value   = e.date;
      document.querySelector(".modal h2").textContent = "Edit Employee";
      document.querySelector(".btn-save").onclick = function() {
        employees[index] = {
          name:   document.getElementById("newName").value.trim(),
          dept:   document.getElementById("newDept").value.trim(),
          pos:    document.getElementById("newPos").value.trim(),
          status: document.getElementById("newStatus").value,
          date:   document.getElementById("newDate").value,
        };
        renderTable(employees);
        document.getElementById("modal").classList.remove("open");
        resetModal();
      };
      document.getElementById("modal").classList.add("open");
    }

    function resetModal() {
      document.querySelector(".modal h2").textContent = "Add New Employee";
      document.querySelector(".btn-save").onclick = addEmployee;
      ["newName","newDept","newPos","newDate"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("newStatus").value = "Active";
    }

    function filterTable() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      renderTable(employees.filter(e =>
        e.name.toLowerCase().includes(q) ||
        e.dept.toLowerCase().includes(q) ||
        e.pos.toLowerCase().includes(q)
      ));
    }

    function addEmployee() {
      const name   = document.getElementById("newName").value.trim();
      const dept   = document.getElementById("newDept").value.trim();
      const pos    = document.getElementById("newPos").value.trim();
      const status = document.getElementById("newStatus").value;
      const date   = document.getElementById("newDate").value;
      if (!name || !dept || !pos || !date) return alert("Please fill all fields.");
      employees.unshift({ name, dept, pos, status, date });
      renderTable(employees);
      document.getElementById("modal").classList.remove("open");
      resetModal();
    }

    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target === this) { this.classList.remove("open"); resetModal(); }
    });

    renderTable(employees);
  </script>
  <script>
  function toggleTheme() {
    var html = document.documentElement;
    var current = html.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }
  </script>
</body>
</html>
